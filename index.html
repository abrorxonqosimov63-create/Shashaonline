<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pro Shashka</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { display: flex; flex-direction: column; align-items: center; background: #121212; color: white; font-family: sans-serif; margin: 0; padding: 10px; overflow: hidden; }
        .profiles { display: flex; justify-content: space-between; width: 95vw; max-width: 400px; margin-bottom: 10px; gap: 8px; }
        .p-card { background: #1e1e1e; padding: 8px; border-radius: 10px; border: 1px solid #4caf50; flex: 1; text-align: center; }
        .p-card.active { border-color: #ffeb3b; box-shadow: 0 0 10px rgba(255, 235, 59, 0.3); }
        .p-name { font-size: 12px; color: #4caf50; font-weight: bold; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .p-timer { font-size: 20px; font-family: monospace; color: #ffeb3b; }
        #board { display: grid; grid-template-columns: repeat(8, 12.5%); width: 95vw; max-width: 400px; height: 95vw; max-height: 400px; border: 5px solid #3e2723; background: #3e2723; }
        .cell { aspect-ratio: 1/1; display: flex; justify-content: center; align-items: center; position: relative; }
        .white-cell { background: #d7ccc8; }
        .black-cell { background: #4e342e; }
        .piece { width: 80%; height: 80%; border-radius: 50%; cursor: pointer; position: relative; z-index: 5; border: 1px solid rgba(0,0,0,0.3); }
        .red-p { background: #d32f2f; box-shadow: 0 4px #b71c1c; }
        .white-p { background: #fbc02d; box-shadow: 0 4px #f9a825; }
        .damka::after { content: '👑'; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 18px; }
        .selected { outline: 3px solid #4caf50; transform: scale(1.05); }
        .possible-move::after { content: ''; width: 12px; height: 12px; background: rgba(76, 175, 80, 0.7); border-radius: 50%; position: absolute; }
        .controls { display: flex; gap: 10px; margin-bottom: 10px; }
        button { background: #4caf50; color: white; border: none; padding: 8px 15px; border-radius: 5px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="profiles">
        <div id="card-red" class="p-card">
            <div id="name-red" class="p-name">Siz</div>
            <div id="timer-red" class="p-timer">00:30</div>
        </div>
        <div id="card-white" class="p-card">
            <div id="name-white" class="p-name">Raqib</div>
            <div id="timer-white" class="p-timer">00:30</div>
        </div>
    </div>
    <div class="controls">
        <button onclick="resetGame()">Qayta boshlash</button>
        <button onclick="tg.close()" style="background:#f44336">❌</button>
    </div>
    <div id="board"></div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const firebaseConfig = {
            apiKey: "AIzaSyBbpI3DjECRf1NClu_RCw5bMnjBkFP24Jo",
            authDomain: "shashkionline-f0674.firebaseapp.com",
            databaseURL: "https://shashkionline-f0674-default-rtdb.firebaseio.com",
            projectId: "shashkionline-f0674",
            storageBucket: "shashkionline-f0674.firebasestorage.app",
            messagingSenderId: "237446280837",
            appId: "1:237446280837:web:ccf349b48ddd2c3d555bec"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const urlParams = new URLSearchParams(window.location.search);
        const gameId = urlParams.get('game') || 'default_room';

        let gameState = null;
        let selectedCell = null;
        let possibleMoves = [];

        // Ma'lumotlarni Firebase'dan olish
        db.ref('games/' + gameId).on('value', (snap) => {
            const data = snap.val();
            if (data) {
                gameState = data;
                renderBoard();
                updateUI();
            } else {
                resetGame();
            }
        });

        function resetGame() {
            const initial = {};
            for(let r=0; r<8; r++) {
                for(let c=0; c<8; c++) {
                    if((r+c)%2 !== 0) {
                        if(r < 3) initial[`${r}-${c}`] = { color: 'white', type: 'normal' };
                        if(r > 4) initial[`${r}-${c}`] = { color: 'red', type: 'normal' };
                    }
                }
            }
            db.ref('games/' + gameId).set({
                turn: 'red',
                pieces: initial,
                redTime: 30,
                whiteTime: 30,
                status: 'playing',
                jumpOnly: null
            });
        }

        function getPieceMoves(r, c, forceJump = false) {
            const pieces = gameState.pieces;
            const piece = pieces[`${r}-${c}`];
            const moves = [];
            const dirs = [[1,1], [1,-1], [-1,1], [-1,-1]];

            dirs.forEach(([dr, dc]) => {
                if (piece.type === 'normal') {
                    const jr = r + dr*2, jc = c + dc*2;
                    if(jr>=0 && jr<8 && jc>=0 && jc<8 && !pieces[`${jr}-${jc}`]) {
                        const midPos = `${r+dr}-${c+dc}`;
                        const mid = pieces[midPos];
                        if(mid && mid.color !== piece.color) moves.push({ r: jr, c: jc, cap: midPos });
                    }
                    if(!forceJump) {
                        const nr = r + dr, nc = c + dc;
                        if(nr>=0 && nr<8 && nc>=0 && nc<8 && !pieces[`${nr}-${nc}`]) {
                            if((piece.color === 'red' && dr < 0) || (piece.color === 'white' && dr > 0)) moves.push({ r: nr, c: nc, cap: null });
                        }
                    }
                } else {
                    // Damka uzoq masofaga yurishi
                    let foundEnemy = false;
                    let enemyPos = null;
                    for(let i=1; i<8; i++) {
                        const nr = r + dr*i, nc = c + dc*i;
                        if(nr<0 || nr>=8 || nc<0 || nc>=8) break;
                        const p = pieces[`${nr}-${nc}`];
                        if(!p) {
                            if(!foundEnemy && !forceJump) moves.push({ r: nr, c: nc, cap: null });
                            if(foundEnemy) moves.push({ r: nr, c: nc, cap: enemyPos });
                        } else {
                            if(p.color === piece.color) break;
                            if(foundEnemy) break;
                            foundEnemy = true;
                            enemyPos = `${nr}-${nc}`;
                        }
                    }
                }
            });
            return moves;
        }

        function handleClick(r, c) {
            if(!gameState || gameState.status !== 'playing') return;
            const pos = `${r}-${c}`;
            const piece = gameState.pieces[pos];

            if (piece && piece.color === gameState.turn) {
                if(gameState.jumpOnly && gameState.jumpOnly !== pos) return;
                
                // Majburiy urishni tekshirish
                let allJumps = [];
                Object.keys(gameState.pieces).forEach(pPos => {
                    const p = gameState.pieces[pPos];
                    if(p.color === gameState.turn) {
                        const [pr, pc] = pPos.split('-').map(Number);
                        const mvs = getPieceMoves(pr, pc, false);
                        mvs.forEach(m => { if(m.cap) allJumps.push({from: pPos, m}); });
                    }
                });

                const moves = getPieceMoves(r, c, allJumps.length > 0);
                selectedCell = pos;
                possibleMoves = allJumps.length > 0 ? moves.filter(m => m.cap) : moves;
                renderBoard();
            } else if (selectedCell && !piece) {
                const move = possibleMoves.find(m => m.r === r && m.c === c);
                if (move) {
                    let newPieces = {...gameState.pieces};
                    let pData = {...newPieces[selectedCell]};
                    if((pData.color === 'red' && move.r === 0) || (pData.color === 'white' && move.r === 7)) pData.type = 'damka';
                    newPieces[`${move.r}-${move.c}`] = pData;
                    delete newPieces[selectedCell];
                    if(move.cap) delete newPieces[move.cap];

                    let nextTurn = gameState.turn === 'red' ? 'white' : 'red';
                    let nextJump = null;
                    if(move.cap) {
                        const extra = getPieceMoves(move.r, move.c, true).filter(m => m.cap);
                        if(extra.length > 0) { nextTurn = gameState.turn; nextJump = `${move.r}-${move.c}`; }
                    }

                    db.ref('games/' + gameId).update({ pieces: newPieces, turn: nextTurn, jumpOnly: nextJump, redTime: 30, whiteTime: 30 });
                    selectedCell = null; possibleMoves = [];
                }
            }
        }

        function renderBoard() {
            if(!gameState) return;
            const boardDiv = document.getElementById('board');
            boardDiv.innerHTML = '';
            for (let r = 0; r < 8; r++) {
                for (let c = 0; c < 8; c++) {
                    const cell = document.createElement('div');
                    const pos = `${r}-${c}`;
                    cell.className = `cell ${(r+c)%2 === 0 ? 'white-cell' : 'black-cell'}`;
                    if (possibleMoves.some(m => m.r === r && m.c === c)) cell.classList.add('possible-move');
                    const p = gameState.pieces[pos];
                    if (p) {
                        const pDiv = document.createElement('div');
                        pDiv.className = `piece ${p.color}-p ${p.type === 'damka' ? 'damka' : ''}`;
                        if (selectedCell === pos) pDiv.classList.add('selected');
                        cell.appendChild(pDiv);
                    }
                    cell.onclick = () => handleClick(r, c);
                    boardDiv.appendChild(cell);
                }
            }
        }

        function updateUI() {
            if(!gameState) return;
            document.getElementById('timer-red').innerText = `00:${gameState.redTime.toString().padStart(2,'0')}`;
            document.getElementById('timer-white').innerText = `00:${gameState.whiteTime.toString().padStart(2,'0')}`;
            document.getElementById('card-red').classList.toggle('active', gameState.turn === 'red');
            document.getElementById('card-white').classList.toggle('active', gameState.turn === 'white');
            if(tg.initDataUnsafe.user) document.getElementById('name-red').innerText = tg.initDataUnsafe.user.first_name;
        }

        setInterval(() => {
            if(gameState && gameState.status === 'playing') {
                let key = gameState.turn === 'red' ? 'redTime' : 'whiteTime';
                if(gameState[key] > 0) db.ref('games/' + gameId + '/' + key).set(gameState[key] - 1);
            }
        }, 1000);
    </script>
</body>
</html>
