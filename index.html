<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Shashka Online</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { display: flex; flex-direction: column; align-items: center; background: #1a1a1a; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 10px; }
        #board { display: grid; grid-template-columns: repeat(8, 12.5%); width: 95vw; max-width: 400px; height: 95vw; max-height: 400px; border: 8px solid #3e2723; }
        .cell { aspect-ratio: 1/1; display: flex; justify-content: center; align-items: center; position: relative; }
        .white-cell { background: #d7ccc8; }
        .black-cell { background: #4e342e; }
        .piece { width: 80%; height: 80%; border-radius: 50%; cursor: pointer; position: relative; border: 2px solid rgba(0,0,0,0.3); }
        .red-p { background: #d32f2f; box-shadow: 0 4px #b71c1c; }
        .white-p { background: #fbc02d; box-shadow: 0 4px #f9a825; }
        .damka::after { content: '👑'; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 20px; }
        .selected { outline: 4px solid #4caf50; z-index: 10; }
        #status { margin: 15px; font-size: 1.1rem; background: #333; padding: 10px 20px; border-radius: 20px; border: 1px solid #555; }
    </style>
</head>
<body>
    <h3>Professional Shashka</h3>
    <div id="status">Yuklanmoqda...</div>
    <div id="board"></div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBbpI3DjECRf1NClu_RCw5bMnjBkFP24Jo",
            authDomain: "shashkionline-f0674.firebaseapp.com",
            databaseURL: "https://shashkionline-f0674-default-rtdb.firebaseio.com",
            projectId: "shashkionline-f0674",
            storageBucket: "shashkionline-f0674.firebasestorage.app",
            messagingSenderId: "237446280837",
            appId: "1:237446280837:web:ccf349b48ddd2c3d555bec"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const urlParams = new URLSearchParams(window.location.search);
        const gameId = urlParams.get('game') || 'pro_room';

        let gameState = { turn: 'red', pieces: {} };
        let selectedCell = null;

        db.ref('games/' + gameId).on('value', (snap) => {
            if (snap.exists()) { gameState = snap.val(); } 
            else { resetGame(); }
            renderBoard();
        });

        function resetGame() {
            const initial = {};
            for(let r=0; r<8; r++) {
                for(let c=0; c<8; c++) {
                    if((r+c)%2 !== 0) {
                        if(r < 3) initial[`${r}-${c}`] = { color: 'white', type: 'normal' };
                        if(r > 4) initial[`${r}-${c}`] = { color: 'red', type: 'normal' };
                    }
                }
            }
            db.ref('games/' + gameId).set({ turn: 'red', pieces: initial });
        }

        function renderBoard() {
            const boardDiv = document.getElementById('board');
            boardDiv.innerHTML = '';
            document.getElementById('status').innerText = gameState.turn === 'red' ? "Navbat: Qizillar" : "Navbat: Oqlar";

            for (let r = 0; r < 8; r++) {
                for (let c = 0; c < 8; c++) {
                    const cell = document.createElement('div');
                    cell.className = `cell ${(r+c)%2 === 0 ? 'white-cell' : 'black-cell'}`;
                    const pos = `${r}-${c}`;
                    const p = gameState.pieces[pos];

                    if (p) {
                        const pDiv = document.createElement('div');
                        pDiv.className = `piece ${p.color}-p ${p.type === 'damka' ? 'damka' : ''}`;
                        if (selectedCell === pos) pDiv.classList.add('selected');
                        cell.appendChild(pDiv);
                    }

                    cell.onclick = () => handleMove(r, c);
                    boardDiv.appendChild(cell);
                }
            }
        }

        function handleMove(r, c) {
            const pos = `${r}-${c}`;
            const piece = gameState.pieces[pos];

            if (piece && piece.color === gameState.turn) {
                selectedCell = pos;
                renderBoard();
                return;
            }

            if (selectedCell && !piece && (r+c)%2 !== 0) {
                const [sr, sc] = selectedCell.split('-').map(Number);
                const sPiece = gameState.pieces[selectedCell];
                const rDiff = r - sr;
                const cDiff = c - sc;
                const absR = Math.abs(rDiff);
                const absC = Math.abs(cDiff);

                let canMove = false;
                let captured = null;

                if (sPiece.type === 'normal') {
                    // Oddiy yurish (faqat oldinga)
                    if (absR === 1 && absC === 1 && (sPiece.color === 'red' ? rDiff < 0 : rDiff > 0)) canMove = true;
                    // Urib olish (oldinga va orqaga)
                    if (absR === 2 && absC === 2) {
                        const midR = (r + sr) / 2;
                        const midC = (c + sc) / 2;
                        const midPos = `${midR}-${midC}`;
                        if (gameState.pieces[midPos] && gameState.pieces[midPos].color !== sPiece.color) {
                            canMove = true;
                            captured = midPos;
                        }
                    }
                } else {
                    // Damka harakati (diagonal bo'ylab xohlagancha)
                    if (absR === absC) {
                        let stepR = rDiff / absR;
                        let stepC = cDiff / absC;
                        let midPieces = [];
                        for (let i = 1; i < absR; i++) {
                            let checkPos = `${sr + i*stepR}-${sc + i*stepC}`;
                            if (gameState.pieces[checkPos]) midPieces.push(checkPos);
                        }
                        if (midPieces.length === 0) canMove = true;
                        if (midPieces.length === 1 && gameState.pieces[midPieces[0]].color !== sPiece.color) {
                            canMove = true;
                            captured = midPieces[0];
                        }
                    }
                }

                if (canMove) {
                    let newPieces = {...gameState.pieces};
                    let newType = sPiece.type;
                    if ((sPiece.color === 'red' && r === 0) || (sPiece.color === 'white' && r === 7)) newType = 'damka';

                    newPieces[pos] = { color: sPiece.color, type: newType };
                    delete newPieces[selectedCell];
                    if (captured) delete newPieces[captured];

                    db.ref('games/' + gameId).update({
                        pieces: newPieces,
                        turn: gameState.turn === 'red' ? 'white' : 'red'
                    });
                    selectedCell = null;
                }
            }
        }
    </script>
</body>
</html>
