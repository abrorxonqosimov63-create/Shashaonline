<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Shashka Online Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { display: flex; flex-direction: column; align-items: center; background: #1a1a1a; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 5px; overflow: hidden; }
        .header { display: flex; justify-content: space-between; width: 95vw; max-width: 400px; margin: 10px 0; }
        .p-card { background: #2c2c2c; padding: 8px; border-radius: 10px; border: 2px solid #444; flex: 1; text-align: center; margin: 0 5px; }
        .p-card.active { border-color: #ffeb3b; box-shadow: 0 0 10px rgba(255, 235, 59, 0.3); }
        .p-name { font-size: 12px; color: #aaa; margin-bottom: 2px; }
        .p-timer { font-size: 18px; font-weight: bold; color: #ffeb3b; }

        #board { display: grid; grid-template-columns: repeat(8, 12.5%); width: 95vw; max-width: 400px; height: 95vw; max-height: 400px; border: 5px solid #3e2723; background: #3e2723; box-shadow: 0 5px 20px rgba(0,0,0,0.5); }
        .cell { aspect-ratio: 1/1; display: flex; justify-content: center; align-items: center; position: relative; }
        .white-cell { background: #d7ccc8; }
        .black-cell { background: #4e342e; }
        
        .piece { width: 85%; height: 85%; border-radius: 50%; cursor: pointer; z-index: 5; position: relative; border: 1px solid rgba(0,0,0,0.3); }
        .red-p { background: #d32f2f; box-shadow: 0 4px #8a1c1c; }
        .white-p { background: #fbc02d; box-shadow: 0 4px #c49000; }
        .damka::after { content: '👑'; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 20px; }
        
        .selected { outline: 3px solid #4caf50; transform: scale(1.1); z-index: 10; }
        .possible-move::after { content: ''; width: 14px; height: 14px; background: rgba(76, 175, 80, 0.7); border-radius: 50%; position: absolute; }

        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; width: 95vw; max-width: 400px; margin-top: 15px; }
        button { background: #333; color: white; border: 1px solid #555; padding: 10px; border-radius: 8px; font-size: 14px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:active { transform: scale(0.95); background: #444; }
        .btn-red { background: #d32f2f; border: none; }
        .btn-green { background: #388e3c; border: none; }
    </style>
</head>
<body>
    <div class="header">
        <div id="card-red" class="p-card">
            <div class="p-name" id="name-red">Siz</div>
            <div id="timer-red" class="p-timer">00:30</div>
        </div>
        <div id="card-white" class="p-card">
            <div class="p-name" id="name-white">Raqib</div>
            <div id="timer-white" class="p-timer">00:30</div>
        </div>
    </div>

    <div id="board"></div>

    <div class="btn-group">
        <button onclick="handleAction('draw')">🤝 Durang</button>
        <button onclick="handleAction('surrender')" class="btn-red">🏳️ Taslim</button>
        <button onclick="resetGame()">♻️ Yangilash</button>
        <button onclick="tg.close()" style="background: #555;">❌ Chiqish</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const firebaseConfig = {
            apiKey: "AIzaSyBbpI3DjECRf1NClu_RCw5bMnjBkFP24Jo",
            authDomain: "shashkionline-f0674.firebaseapp.com",
            databaseURL: "https://shashkionline-f0674-default-rtdb.firebaseio.com",
            projectId: "shashkionline-f0674",
            storageBucket: "shashkionline-f0674.firebasestorage.app",
            messagingSenderId: "237446280837",
            appId: "1:237446280837:web:ccf349b48ddd2c3d555bec"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const urlParams = new URLSearchParams(window.location.search);
        const gameId = urlParams.get('game') || 'global_room';

        let gameState = null;
        let selectedCell = null;
        let possibleMoves = [];

        db.ref('games/' + gameId).on('value', (snap) => {
            gameState = snap.val();
            if (gameState) { renderBoard(); updateUI(); } 
            else { resetGame(); }
        });

        function resetGame() {
            const pieces = {};
            for(let r=0; r<8; r++) {
                for(let c=0; c<8; c++) {
                    if((r+c)%2 !== 0) {
                        if(r < 3) pieces[`${r}-${c}`] = { color: 'white', type: 'normal' };
                        if(r > 4) pieces[`${r}-${c}`] = { color: 'red', type: 'normal' };
                    }
                }
            }
            db.ref('games/' + gameId).set({
                turn: 'red', pieces, redTime: 30, whiteTime: 30, status: 'playing', jumpOnly: null
            });
        }

        function getMoves(r, c, forceJump = false) {
            const piece = gameState.pieces[`${r}-${c}`];
            const moves = [];
            const dirs = [[1,1], [1,-1], [-1,1], [-1,-1]];

            dirs.forEach(([dr, dc]) => {
                if (piece.type === 'normal') {
                    // Oddiy tosh urishi
                    const jr = r + dr*2, jc = c + dc*2;
                    const mid = `${r+dr}-${c+dc}`;
                    if (jr>=0 && jr<8 && jc>=0 && jc<8 && !gameState.pieces[`${jr}-${jc}`]) {
                        if (gameState.pieces[mid] && gameState.pieces[mid].color !== piece.color) {
                            moves.push({ r: jr, c: jc, cap: mid });
                        }
                    }
                    // Oddiy yurish
                    if (!forceJump) {
                        const nr = r + dr, nc = c + dc;
                        if (nr>=0 && nr<8 && nc>=0 && nc<8 && !gameState.pieces[`${nr}-${nc}`]) {
                            if ((piece.color === 'red' && dr < 0) || (piece.color === 'white' && dr > 0)) {
                                moves.push({ r: nr, c: nc, cap: null });
                            }
                        }
                    }
                } else {
                    // Damka
                    let enemyPos = null;
                    for (let i = 1; i < 8; i++) {
                        const nr = r+dr*i, nc = c+dc*i;
                        if (nr<0 || nr>=8 || nc<0 || nc>=8) break;
                        const p = gameState.pieces[`${nr}-${nc}`];
                        if (!p) {
                            if (!enemyPos && !forceJump) moves.push({ r: nr, c: nc, cap: null });
                            if (enemyPos) moves.push({ r: nr, c: nc, cap: enemyPos });
                        } else {
                            if (p.color === piece.color || enemyPos) break;
                            enemyPos = `${nr}-${nc}`;
                        }
                    }
                }
            });
            return moves;
        }

        function handleClick(r, c) {
            if (!gameState || gameState.status !== 'playing') return;
            const pos = `${r}-${c}`;
            const p = gameState.pieces[pos];

            if (p && p.color === gameState.turn) {
                if (gameState.jumpOnly && gameState.jumpOnly !== pos) return;
                
                // Majburiy urishni tekshirish
                let canJump = false;
                Object.keys(gameState.pieces).forEach(k => {
                    if (gameState.pieces[k].color === gameState.turn) {
                        const [pr, pc] = k.split('-').map(Number);
                        if (getMoves(pr, pc, false).some(m => m.cap)) canJump = true;
                    }
                });

                selectedCell = pos;
                const moves = getMoves(r, c, canJump);
                possibleMoves = canJump ? moves.filter(m => m.cap) : moves;
                renderBoard();
            } else if (selectedCell && !p) {
                const move = possibleMoves.find(m => m.r === r && m.c === c);
                if (move) {
                    let newPieces = JSON.parse(JSON.stringify(gameState.pieces));
                    let pData = newPieces[selectedCell];
                    
                    if ((pData.color === 'red' && move.r === 0) || (pData.color === 'white' && move.r === 7)) pData.type = 'damka';
                    
                    newPieces[`${move.r}-${move.c}`] = pData;
                    delete newPieces[selectedCell];
                    if (move.cap) delete newPieces[move.cap];

                    let nextTurn = gameState.turn === 'red' ? 'white' : 'red';
                    let nextJump = null;
                    
                    if (move.cap && getMoves(move.r, move.c, true).some(m => m.cap)) {
                        nextTurn = gameState.turn;
                        nextJump = `${move.r}-${move.c}`;
                    }

                    db.ref('games/' + gameId).update({
                        pieces: newPieces, turn: nextTurn, jumpOnly: nextJump, redTime: 30, whiteTime: 30
                    });
                    selectedCell = null; possibleMoves = [];
                }
            }
        }

        function handleAction(type) {
            if (type === 'surrender') {
                if(confirm("Taslim bo'lasizmi?")) db.ref('games/' + gameId).update({ status: 'finished', winner: gameState.turn === 'red' ? 'white' : 'red' });
            } else if (type === 'draw') {
                alert("Durang taklifi yuborildi (Hozircha avtomatik durang)");
                resetGame();
            }
        }

        function renderBoard() {
            const b = document.getElementById('board'); b.innerHTML = '';
            for (let r=0; r<8; r++) {
                for (let c=0; c<8; c++) {
                    const cell = document.createElement('div');
                    cell.className = `cell ${(r+c)%2===0 ? 'white-cell' : 'black-cell'}`;
                    const pos = `${r}-${c}`;
                    if (possibleMoves.some(m => m.r === r && m.c === c)) cell.classList.add('possible-move');
                    const p = gameState.pieces[pos];
                    if (p) {
                        const d = document.createElement('div');
                        d.className = `piece ${p.color}-p ${p.type==='damka'?'damka':''}`;
                        if (selectedCell === pos) d.classList.add('selected');
                        cell.appendChild(d);
                    }
                    cell.onclick = () => handleClick(r, c);
                    b.appendChild(cell);
                }
            }
        }

        function updateUI() {
            document.getElementById('timer-red').innerText = `00:${gameState.redTime}`;
            document.getElementById('timer-white').innerText = `00:${gameState.whiteTime}`;
            document.getElementById('card-red').classList.toggle('active', gameState.turn === 'red');
            document.getElementById('card-white').classList.toggle('active', gameState.turn === 'white');
            if(tg.initDataUnsafe.user) document.getElementById('name-red').innerText = tg.initDataUnsafe.user.first_name;
        }

        setInterval(() => {
            if (gameState && gameState.status === 'playing') {
                let k = gameState.turn === 'red' ? 'redTime' : 'whiteTime';
                if (gameState[k] > 0) db.ref(`games/${gameId}/${k}`).set(gameState[k] - 1);
            }
        }, 1000);
    </script>
</body>
</html>
