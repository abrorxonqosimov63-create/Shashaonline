<script>
    // ... FirebaseConfig tepada o'zgarmaydi ...

    function handleCellClick(r, c) {
        const pos = `${r}-${c}`;
        const piece = gameState.pieces[pos];

        // 1. O'z donasini tanlash
        if (piece && piece === gameState.turn) {
            selectedCell = pos;
            renderBoard();
            return;
        }

        if (selectedCell && !piece && (r+c)%2 !== 0) {
            const [sr, sc] = selectedCell.split('-').map(Number);
            const rowDiff = r - sr;
            const colDiff = Math.abs(c - sc);
            
            let isCapture = false;
            let capturedPos = null;

            // 2. Urib olish (Majburiy mantiq asosi)
            if (Math.abs(rowDiff) === 2 && colDiff === 2) {
                const midR = (r + sr) / 2;
                const midC = (c + sc) / 2;
                const midPos = `${midR}-${midC}`;
                const midPiece = gameState.pieces[midPos];

                if (midPiece && midPiece !== gameState.turn) {
                    isCapture = true;
                    capturedPos = midPos;
                }
            }

            // 3. Oddiy yurish (faqat oldinga va faqat urib olmasa)
            const isNormalMove = (gameState.turn === 'red' ? rowDiff === -1 : rowDiff === 1) && colDiff === 1;

            if (isCapture || isNormalMove) {
                const newPieces = {...gameState.pieces};
                newPieces[pos] = gameState.turn;
                delete newPieces[selectedCell];
                
                if (isCapture) {
                    delete newPieces[capturedPos];
                }

                db.ref('games/' + gameId).update({
                    pieces: newPieces,
                    turn: gameState.turn === 'red' ? 'white' : 'red'
                });
                selectedCell = null;
            }
        }
    }
</script>
