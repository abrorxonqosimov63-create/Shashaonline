        body { display: flex; flex-direction: column; align-items: center; background: #121212; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 10px; overflow: hidden; touch-action: manipulation; }
        .profiles { display: flex; justify-content: space-between; width: 95vw; max-width: 400px; margin-bottom: 15px; gap: 10px; }
        .p-card { background: #1e1e1e; padding: 12px; border-radius: 15px; border: 1px solid #4caf50; flex: 1; text-align: center; transition: all 0.3s; }
        .p-card.active { border: 2px solid #ffeb3b; box-shadow: 0 0 15px rgba(255, 235, 59, 0.4); transform: scale(1.02); }
        .p-name { font-size: 14px; font-weight: bold; color: #4caf50; margin-bottom: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .p-timer { font-family: 'Courier New', Courier, monospace; font-size: 22px; color: #ffeb3b; font-weight: bold; }
        
        #board { display: grid; grid-template-columns: repeat(8, 12.5%); width: 95vw; max-width: 400px; height: 95vw; max-height: 400px; border: 8px solid #3e2723; border-radius: 4px; background: #3e2723; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .cell { aspect-ratio: 1/1; display: flex; justify-content: center; align-items: center; position: relative; }
        .white-cell { background: #d7ccc8; }
        .black-cell { background: #4e342e; }
        
        .piece { width: 82%; height: 82%; border-radius: 50%; cursor: pointer; position: relative; z-index: 5; border: 2px solid rgba(0,0,0,0.4); transition: transform 0.2s; }
        .red-p { background: #d32f2f; box-shadow: 0 5px #b71c1c; }
        .white-p { background: #fbc02d; box-shadow: 0 5px #f9a825; }
        .damka::after { content: '👑'; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 22px; }
        
        .selected { outline: 4px solid #4caf50; transform: scale(1.1) translateY(-3px); z-index: 10; }
        .possible-move::after { content: ''; width: 16px; height: 16px; background: rgba(76, 175, 80, 0.8); border-radius: 50%; position: absolute; z-index: 2; }
        
        .controls { display: flex; gap: 10px; margin-bottom: 15px; }
        button { background: #4caf50; color: white; border: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; box-shadow: 0 4px #2e7d32; }
        button:active { transform: translateY(2px); box-shadow: 0 2px #2e7d32; }
        .exit-btn { background: #f44336; box-shadow: 0 4px #c62828; }

        function resetGame() {
            const initial = {};
            for(let r=0; r<8; r++) {
                for(let c=0; c<8; c++) {
                    if((r+c)%2 !== 0) {
                        if(r < 3) initial[`${r}-${c}`] = { color: 'white', type: 'normal' };
                        if(r > 4) initial[`${r}-${c}`] = { color: 'red', type: 'normal' };
                    }
                }
            }
            db.ref('games/' + gameId).set({ turn: 'red', pieces: initial, redTime: 30, whiteTime: 30, status: 'playing', jumpOnly: null });
        }

            const pieces = customPieces || gameState.pieces;
            const piece = pieces[`${r}-${c}`];
            const moves = [];
            const dirs = [[1,1], [1,-1], [-1,1], [-1,-1]];

            dirs.forEach(([dr, dc]) => {
                if (piece.type === 'normal') {
                    // Oddiy tosh urishi (4 yo'nalishda ham uradi)
                    const jr = r + dr*2, jc = c + dc*2;
                    if(jr>=0 && jr<8 && jc>=0 && jc<8 && !pieces[`${jr}-${jc}`]) {
                        const midPos = `${r+dr}-${c+dc}`;
                        const midPiece = pieces[midPos];
                        if(midPiece && midPiece.color !== piece.color) moves.push({ r: jr, c: jc, cap: midPos });
                    }
                    // Oddiy yurish (Faqat oldinga)
                    if(!forceJump) {
                        const nr = r + dr, nc = c + dc;
                        if(nr>=0 && nr<8 && nc>=0 && nc<8 && !pieces[`${nr}-${nc}`]) {
                            if((piece.color === 'red' && dr < 0) || (piece.color === 'white' && dr > 0)) moves.push({ r: nr, c: nc, cap: null });

                    let foundEnemy = false;
                    let enemyPos = null;

                        if(nr<0 || nr>=8 || nc<0 || nc>=8) break;
                        const p = pieces[`${nr}-${nc}`];

                            if(!foundEnemy && !forceJump) moves.push({ r: nr, c: nc, cap: null });
                            if(foundEnemy) moves.push({ r: nr, c: nc, cap: enemyPos });
                        } else {
                            if(p.color === piece.color) break; // O'zimizniki bo'lsa yo'l yopiq

                            foundEnemy = true;
                            enemyPos = `${nr}-${nc}`;
                        }
                    }
                }
            });
            return moves;
        }

            const jumpMoves = [];

                const p = gameState.pieces[pos];
                if(p.color === color) {
                    const [r, c] = pos.split('-').map(Number);
                    const moves = getPieceMoves(r, c, false);
                    moves.forEach(m => { if(m.cap) jumpMoves.push({ from: pos, to: m }); });
                }
            });
            return jumpMoves;
        }

            }
