    <style>
        body { display: flex; flex-direction: column; align-items: center; background: #1a1a1a; color: white; font-family: sans-serif; margin: 0; padding: 5px; }
        .header { display: flex; justify-content: space-between; width: 95vw; max-width: 400px; margin: 10px 0; }
        .p-card { background: #2c2c2c; padding: 10px; border-radius: 10px; border: 2px solid #444; flex: 1; text-align: center; margin: 0 5px; }
        .p-card.active { border-color: #ffeb3b; box-shadow: 0 0 10px #ffeb3b; }
        #board { display: grid; grid-template-columns: repeat(8, 12.5%); width: 95vw; max-width: 400px; height: 95vw; max-height: 400px; border: 5px solid #3e2723; background: #3e2723; }
        .cell { aspect-ratio: 1/1; display: flex; justify-content: center; align-items: center; position: relative; }
        .white-cell { background: #d7ccc8; }
        .black-cell { background: #4e342e; }
        .piece { width: 85%; height: 85%; border-radius: 50%; cursor: pointer; position: relative; border: 1px solid rgba(0,0,0,0.3); transition: 0.2s; }
        .red-p { background: #d32f2f; box-shadow: 0 4px #8a1c1c; }
        .white-p { background: #fbc02d; box-shadow: 0 4px #c49000; }
        .damka::after { content: '👑'; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 20px; }
        .selected { outline: 4px solid #4caf50; transform: scale(1.1); z-index: 10; }
        .possible-move::after { content: ''; width: 16px; height: 16px; background: rgba(76, 175, 80, 0.8); border-radius: 50%; position: absolute; }
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; width: 95vw; max-width: 400px; margin-top: 15px; }
        button { padding: 12px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; background: #444; color: white; }
        .btn-red { background: #d32f2f; }
        .btn-green { background: #388e3c; }
    </style>
</head>

        const urlParams = new URLSearchParams(window.location.search);
        const gameId = urlParams.get('game') || 'room_v2';

        let gameState = null;

        db.ref('games/' + gameId).on('value', (snap) => {
            gameState = snap.val();
            if (gameState) { renderBoard(); updateUI(); } 
            else { resetGame(); }
        });

        function resetGame() {
            const pieces = {};
            for(let r=0; r<8; r++) {
                for(let c=0; c<8; c++) {
                    if((r+c)%2 !== 0) {
                        if(r < 3) pieces[`${r}-${c}`] = { color: 'white', type: 'normal' };
                        if(r > 4) pieces[`${r}-${c}`] = { color: 'red', type: 'normal' };
                    }
                }
            }
            db.ref('games/' + gameId).set({ turn: 'red', pieces, redTime: 30, whiteTime: 30, status: 'playing', jumpOnly: null });
        }

        function getMoves(r, c, forceJump = false) {
            const piece = gameState.pieces[`${r}-${c}`];
            if (!piece) return [];
            const moves = [];
            const dirs = [[1,1], [1,-1], [-1,1], [-1,-1]];

            dirs.forEach(([dr, dc]) => {
                // URIShNI TEKShIRISh
                const jr = r + dr*2, jc = c + dc*2;
                const mid = `${r+dr}-${c+dc}`;
                if (jr>=0 && jr<8 && jc>=0 && jc<8 && !gameState.pieces[`${jr}-${jc}`]) {
                    if (gameState.pieces[mid] && gameState.pieces[mid].color !== piece.color) {
                        moves.push({ r: jr, c: jc, cap: mid });
                    }
                }
                // ODDIY YuRISh
                if (!forceJump) {
                    const nr = r + dr, nc = c + dc;
                    if (nr>=0 && nr<8 && nc>=0 && nc<8 && !gameState.pieces[`${nr}-${nc}`]) {
                        if (piece.type === 'damka') moves.push({ r: nr, c: nc, cap: null });
                        else if (piece.color === 'red' && dr < 0) moves.push({ r: nr, c: nc, cap: null });
                        else if (piece.color === 'white' && dr > 0) moves.push({ r: nr, c: nc, cap: null });
                    }
                }
            });
            return moves;
        }

                // Agar zanjirli urish bo'lsa, faqat o'sha toshni tanlash mumkin
