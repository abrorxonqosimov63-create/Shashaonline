<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Shashka Online</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { display: flex; flex-direction: column; align-items: center; background: #1a1a1a; color: white; font-family: sans-serif; margin: 0; padding: 10px; }
        #board { display: grid; grid-template-columns: repeat(8, 12.5%); width: 95vw; max-width: 400px; height: 95vw; max-height: 400px; border: 8px solid #3e2723; }
        .cell { aspect-ratio: 1/1; display: flex; justify-content: center; align-items: center; }
        .white-cell { background: #d7ccc8; }
        .black-cell { background: #4e342e; }
        .piece { width: 80%; height: 80%; border-radius: 50%; cursor: pointer; position: relative; border: 2px solid rgba(0,0,0,0.3); }
        .red-p { background: #d32f2f; box-shadow: 0 4px #b71c1c; }
        .white-p { background: #fbc02d; box-shadow: 0 4px #f9a825; }
        .damka::after { content: '👑'; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 20px; }
        .selected { outline: 4px solid #4caf50; z-index: 10; }
        #status { margin: 15px; font-size: 1.1rem; background: #333; padding: 10px 20px; border-radius: 20px; }
    </style>
</head>
<body>
    <h3>Pro Shashka (Majburiy urish)</h3>
    <div id="status">Yuklanmoqda...</div>
    <div id="board"></div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBbpI3DjECRf1NClu_RCw5bMnjBkFP24Jo",
            authDomain: "shashkionline-f0674.firebaseapp.com",
            databaseURL: "https://shashkionline-f0674-default-rtdb.firebaseio.com",
            projectId: "shashkionline-f0674",
            storageBucket: "shashkionline-f0674.firebasestorage.app",
            messagingSenderId: "237446280837",
            appId: "1:237446280837:web:ccf349b48ddd2c3d555bec"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const urlParams = new URLSearchParams(window.location.search);
        const gameId = urlParams.get('game') || 'pro_v3';

        let gameState = { turn: 'red', pieces: {}, lastCapturer: null };
        let selectedCell = null;

        db.ref('games/' + gameId).on('value', (snap) => {
            if (snap.exists()) { gameState = snap.val(); } 
            else { resetGame(); }
            renderBoard();
        });

        function resetGame() {
            const initial = {};
            for(let r=0; r<8; r++) {
                for(let c=0; c<8; c++) {
                    if((r+c)%2 !== 0) {
                        if(r < 3) initial[`${r}-${c}`] = { color: 'white', type: 'normal' };
                        if(r > 4) initial[`${r}-${c}`] = { color: 'red', type: 'normal' };
                    }
                }
            }
            db.ref('games/' + gameId).set({ turn: 'red', pieces: initial, lastCapturer: null });
        }

        function getAllCaptures(color) {
            const captures = [];
            for (let pos in gameState.pieces) {
                if (gameState.pieces[pos].color === color) {
                    const [r, c] = pos.split('-').map(Number);
                    const moves = getAvailableMoves(r, c);
                    const pieceCaptures = moves.filter(m => m.captured);
                    if (pieceCaptures.length > 0) captures.push({ pos, moves: pieceCaptures });
                }
            }
            return captures;
        }

        function getAvailableMoves(r, c) {
            const piece = gameState.pieces[`${r}-${c}`];
            const moves = [];
            const dirs = [[1, 1], [1, -1], [-1, 1], [-1, -1]];

            dirs.forEach(([dr, dc]) => {
                if (piece.type === 'normal') {
                    // Oddiy yurish (faqat oldinga)
                    const nr = r + dr, nc = c + dc;
                    if (nr>=0 && nr<8 && nc>=0 && nc<8 && !gameState.pieces[`${nr}-${nc}`]) {
                        if ((piece.color === 'red' && dr < 0) || (piece.color === 'white' && dr > 0)) {
                            moves.push({ r: nr, c: nc, captured: null });
                        }
                    }
                    // Urib olish (har qanday tomonga)
                    const jr = r + dr*2, jc = c + dc*2;
                    if (jr>=0 && jr<8 && jc>=0 && jc<8 && !gameState.pieces[`${jr}-${jc}`]) {
                        const mid = gameState.pieces[`${r+dr}-${c+dc}`];
                        if (mid && mid.color !== piece.color) moves.push({ r: jr, c: jc, captured: `${r+dr}-${c+dc}` });
                    }
                } else {
                    // Damka mantiqi
                    for (let i = 1; i < 8; i++) {
                        const nr = r + dr*i, nc = c + dc*i;
                        if (nr<0 || nr>=8 || nc<0 || nc>=8) break;
                        const p = gameState.pieces[`${nr}-${nc}`];
                        if (!p) moves.push({ r: nr, c: nc, captured: null });
                        else {
                            if (p.color !== piece.color) {
                                const jr = nr + dr, jc = nc + dc;
                                if (jr>=0 && jr<8 && jc>=0 && jc<8 && !gameState.pieces[`${jr}-${jc}`]) {
                                    moves.push({ r: jr, c: jc, captured: `${nr}-${nc}` });
                                }
                            }
                            break;
                        }
                    }
                }
            });
            return moves;
        }

        function renderBoard() {
            const boardDiv = document.getElementById('board');
            boardDiv.innerHTML = '';
            document.getElementById('status').innerText = (gameState.lastCapturer ? "Davom eting: " : "Navbat: ") + (gameState.turn === 'red' ? "Qizillar" : "Oqlar");

            for (let r = 0; r < 8; r++) {
                for (let c = 0; c < 8; c++) {
                    const cell = document.createElement('div');
                    cell.className = `cell ${(r+c)%2 === 0 ? 'white-cell' : 'black-cell'}`;
                    const pos = `${r}-${c}`;
                    const p = gameState.pieces[pos];
                    if (p) {
                        const pDiv = document.createElement('div');
                        pDiv.className = `piece ${p.color}-p ${p.type === 'damka' ? 'damka' : ''}`;
                        if (selectedCell === pos) pDiv.classList.add('selected');
                        cell.appendChild(pDiv);
                    }
                    cell.onclick = () => handleMove(r, c);
                    boardDiv.appendChild(cell);
                }
            }
        }

        function handleMove(r, c) {
            const pos = `${r}-${c}`;
            const piece = gameState.pieces[pos];

            if (piece && piece.color === gameState.turn) {
                if (gameState.lastCapturer && gameState.lastCapturer !== pos) return;
                selectedCell = pos;
                renderBoard();
                return;
            }

            if (selectedCell && !piece) {
                const [sr, sc] = selectedCell.split('-').map(Number);
                const available = getAvailableMoves(sr, sc);
                const move = available.find(m => m.r === r && m.c === c);
                
                // Majburiy urish tekshiruvi
                const allCaptures = getAllCaptures(gameState.turn);
                if (allCaptures.length > 0 && (!move || !move.captured)) {
                    alert("Urib olish majburiy!");
                    return;
                }

                if (move) {
                    let newPieces = {...gameState.pieces};
                    let newType = gameState.pieces[selectedCell].type;
                    if ((gameState.pieces[selectedCell].color === 'red' && r === 0) || (gameState.pieces[selectedCell].color === 'white' && r === 7)) newType = 'damka';

                    newPieces[pos] = { color: gameState.turn, type: newType };
                    delete newPieces[selectedCell];
                    if (move.captured) delete newPieces[move.captured];

                    // Yana urish mumkinmi?
                    let nextTurn = gameState.turn === 'red' ? 'white' : 'red';
                    let nextCapturer = null;
                    if (move.captured) {
                        const nextMoves = getAvailableMoves(r, c).filter(m => m.captured);
                        if (nextMoves.length > 0) {
                            nextTurn = gameState.turn;
                            nextCapturer = pos;
                        }
                    }

                    db.ref('games/' + gameId).update({
                        pieces: newPieces,
                        turn: nextTurn,
                        lastCapturer: nextCapturer
                    });
                    selectedCell = null;
                }
            }
        }
    </script>
</body>
</html>
