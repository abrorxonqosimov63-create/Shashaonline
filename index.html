<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Shashka Online v7</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { display: flex; flex-direction: column; align-items: center; background: #121212; color: white; font-family: sans-serif; margin: 0; padding: 10px; overflow: hidden; }
        #board { display: grid; grid-template-columns: repeat(8, 12.5%); width: 95vw; max-width: 400px; height: 95vw; max-height: 400px; border: 6px solid #3e2723; background: #3e2723; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .cell { aspect-ratio: 1/1; display: flex; justify-content: center; align-items: center; position: relative; }
        .white-cell { background: #d7ccc8; }
        .black-cell { background: #4e342e; }
        .piece { width: 85%; height: 85%; border-radius: 50%; cursor: pointer; position: relative; border: 2px solid rgba(0,0,0,0.4); z-index: 2; transition: all 0.2s; }
        .red-p { background: #d32f2f; box-shadow: 0 4px #b71c1c; }
        .white-p { background: #fbc02d; box-shadow: 0 4px #f9a825; }
        .damka::after { content: '👑'; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 20px; }
        .selected { outline: 4px solid #4caf50; box-shadow: 0 0 15px #4caf50; transform: scale(1.05); }
        .possible-move::after { content: ''; width: 14px; height: 14px; background: rgba(76, 175, 80, 0.8); border-radius: 50%; position: absolute; z-index: 1; }
        #status { margin: 10px; font-size: 0.9rem; background: #333; padding: 10px 15px; border-radius: 20px; border: 1px solid #4caf50; min-width: 180px; text-align: center; }
        .controls { display: flex; gap: 5px; margin-bottom: 10px; flex-wrap: wrap; justify-content: center; }
        button { background: #4caf50; color: white; border: none; padding: 8px 12px; border-radius: 5px; cursor: pointer; font-size: 12px; font-weight: bold; }
        .resign-btn { background: #ff9800; }
        .draw-btn { background: #2196f3; }
        .exit-btn { background: #f44336; }
        button:active { transform: scale(0.95); }
    </style>
</head>
<body>
    <div class="controls">
        <button onclick="setMode('pvp')">👥 Do'st</button>
        <button onclick="setMode('pve')">🤖 Bot</button>
        <button class="draw-btn" onclick="offerDraw()">🤝 Durang</button>
        <button class="resign-btn" onclick="resign()">🏳️ Taslim</button>
        <button class="exit-btn" onclick="closeGame()">❌</button>
    </div>
    <div id="status">Yuklanmoqda...</div>
    <div id="board"></div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        function closeGame() { tg.close(); }

        const firebaseConfig = {
            apiKey: "AIzaSyBbpI3DjECRf1NClu_RCw5bMnjBkFP24Jo",
            authDomain: "shashkionline-f0674.firebaseapp.com",
            databaseURL: "https://shashkionline-f0674-default-rtdb.firebaseio.com",
            projectId: "shashkionline-f0674",
            storageBucket: "shashkionline-f0674.firebasestorage.app",
            messagingSenderId: "237446280837",
            appId: "1:237446280837:web:ccf349b48ddd2c3d555bec"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const urlParams = new URLSearchParams(window.location.search);
        const gameId = urlParams.get('game') || 'global_room';

        let gameState = { turn: 'red', pieces: {}, jumpOnly: null, mode: 'pvp', status: 'playing' };
        let selectedCell = null;
        let possibleMoves = [];

        db.ref('games/' + gameId).on('value', (snap) => {
            if (snap.exists()) { 
                gameState = snap.val(); 
                renderBoard();
                if (gameState.status !== 'playing') {
                    handleGameOver(gameState.status);
                } else if (gameState.mode === 'pve' && gameState.turn === 'white') {
                    setTimeout(botMove, 700);
                }
            } else { resetGame(); }
        });

        function handleGameOver(status) {
            let msg = "";
            if (status === 'draw') msg = "O'yin durang bilan tugadi! 🤝";
            else if (status === 'red_resigned') msg = "Qizillar taslim bo'ldi. Oqlar g'alaba qozondi! 🏳️";
            else if (status === 'white_resigned') msg = "Oqlar taslim bo'ldi. Qizillar g'alaba qozondi! 🏳️";
            document.getElementById('status').innerText = msg;
        }

        function offerDraw() {
            if (gameState.status !== 'playing') return;
            if (gameState.mode === 'pve') {
                if (Math.random() > 0.5) {
                    alert("Bot durangga rozi bo'ldi!");
                    db.ref('games/' + gameId).update({ status: 'draw' });
                } else {
                    alert("Bot durangga rozi emas! O'yinni davom ettiring.");
                }
            } else {
                if (confirm("Durang taklif qilasizmi? Raqib rozi bo'lsa o'yin to'xtaydi.")) {
                    db.ref('games/' + gameId).update({ status: 'draw' });
                }
            }
        }

        function resign() {
            if (gameState.status !== 'playing') return;
            if (confirm("Taslim bo'lmoqchimisiz?")) {
                const result = gameState.turn === 'red' ? 'red_resigned' : 'white_resigned';
                db.ref('games/' + gameId).update({ status: result });
            }
        }

        function setMode(m) { db.ref('games/' + gameId).update({ mode: m, status: 'playing' }); }

        function resetGame() {
            const initial = {};
            for(let r=0; r<8; r++) {
                for(let c=0; c<8; c++) {
                    if((r+c)%2 !== 0) {
                        if(r < 3) initial[`${r}-${c}`] = { color: 'white', type: 'normal' };
                        if(r > 4) initial[`${r}-${c}`] = { color: 'red', type: 'normal' };
                    }
                }
            }
            db.ref('games/' + gameId).set({ turn: 'red', pieces: initial, jumpOnly: null, mode: 'pvp', status: 'playing' });
        }

        // ... [Qolgan shashka mantiqi: getMoves, botMove, executeMove, renderBoard, handleClick avvalgi kod bilan bir xil] ...
        // (Joy tejash uchun bu yerda asosiy mantiq qisqartirildi, lekin barcha funksiyalar ishlaydi)
        
        function getMoves(r, c, forceJump = false, customPieces = null) {
            const pieces = customPieces || gameState.pieces;
            const piece = pieces[`${r}-${c}`];
            if (!piece) return [];
            const moves = [];
            const dirs = [[1, 1], [1, -1], [-1, 1], [-1, -1]];
            dirs.forEach(([dr, dc]) => {
                if (piece.type === 'normal') {
                    if (!forceJump) {
                        const nr = r + dr, nc = c + dc;
                        if (nr>=0 && nr<8 && nc>=0 && nc<8 && !pieces[`${nr}-${nc}`]) {
                            if ((piece.color === 'red' && dr < 0) || (piece.color === 'white' && dr > 0)) moves.push({ r: nr, c: nc, cap: null });
                        }
                    }
                    const jr = r + dr*2, jc = c + dc*2;
                    if (jr>=0 && jr<8 && jc>=0 && jc<8 && !pieces[`${jr}-${jc}`]) {
                        const mid = pieces[`${r+dr}-${c+dc}`];
                        if (mid && mid.color !== piece.color) moves.push({ r: jr, c: jc, cap: `${r+dr}-${c+dc}` });
                    }
                } else {
                    for (let i = 1; i < 8; i++) {
                        const nr = r + dr*i, nc = c + dc*i;
                        if (nr<0 || nr>=8 || nc<0 || nc>=8) break;
                        const p = pieces[`${nr}-${nc}`];
                        if (!p) { if (!forceJump) moves.push({ r: nr, c: nc, cap: null }); }
                        else {
                            if (p.color !== piece.color) {
                                const jr = nr + dr, jc = nc + dc;
                                if (jr>=0 && jr<8 && jc>=0 && jc<8 && !pieces[`${jr}-${jc}`]) moves.push({ r: jr, c: jc, cap: `${nr}-${nc}` });
                            }
                            break;
                        }
                    }
                }
            });
            return moves;
        }

        function botMove() {
            if (gameState.turn !== 'white' || gameState.status !== 'playing') return;
            let allBotPieces = Object.keys(gameState.pieces).filter(p => gameState.pieces[p].color === 'white');
            let captureMoves = [];
            let normalMoves = [];
            allBotPieces.forEach(pos => {
                const [r, c] = pos.split('-').map(Number);
                const moves = getMoves(r, c, !!gameState.jumpOnly);
                moves.forEach(m => {
                    if (m.cap) captureMoves.push({ from: pos, to: m });
                    else normalMoves.push({ from: pos, to: m });
                });
            });
            const finalMove = captureMoves.length > 0 ? captureMoves[Math.floor(Math.random() * captureMoves.length)] : normalMoves[Math.floor(Math.random() * normalMoves.length)];
            if (finalMove) executeMove(finalMove.from, finalMove.to);
        }

        function executeMove(from, to) {
            let newPieces = {...gameState.pieces};
            let pData = {...newPieces[from]};
            if ((pData.color === 'red' && to.r === 0) || (pData.color === 'white' && to.r === 7)) pData.type = 'damka';
            newPieces[`${to.r}-${to.c}`] = pData;
            delete newPieces[from];
            if (to.cap) delete newPieces[to.cap];
            let nextJumpOnly = null;
            let nextTurn = gameState.turn === 'red' ? 'white' : 'red';
            if (to.cap) {
                const extra = getMoves(to.r, to.c, true, newPieces).filter(m => m.cap);
                if (extra.length > 0) { nextJumpOnly = `${to.r}-${to.c}`; nextTurn = gameState.turn; }
            }
            db.ref('games/' + gameId).update({ pieces: newPieces, turn: nextTurn, jumpOnly: nextJumpOnly });
        }

        function renderBoard() {
            const boardDiv = document.getElementById('board');
            boardDiv.innerHTML = '';
            let statusEl = document.getElementById('status');
            if (gameState.status === 'playing') {
                statusEl.innerText = gameState.turn === 'red' ? "Navbat: Siz (Qizil)"
